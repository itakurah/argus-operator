image:
  registry: ""
  repository: argus-operator
  tag: dev
  pullPolicy: IfNotPresent
  pullSecrets: []

replicas: 1

serviceAccount:
  create: true
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources: {}

metrics:
  port: 8080
health:
  port: 8081

nodeSelector: {}
tolerations: []
affinity: {}

rbac:
  create: true
